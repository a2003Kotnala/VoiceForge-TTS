services:
  - type: web
    name: voiceforge-kokoro
    runtime: docker
    rootDir: kokoro-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: KOKORO_SERVICE_API_KEY
        sync: false
      - key: KOKORO_MAX_TEXT_LENGTH
        value: 3200
      - key: KOKORO_CACHE_ITEMS
        value: 16
      - key: KOKORO_PREWARM
        value: 1
      - key: KOKORO_INFLIGHT_WAIT_SECONDS
        value: 90

  - type: web
    name: voiceforge-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    disk:
      name: voiceforge-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: REQUEST_BODY_LIMIT
        value: 32kb
      - key: MAX_TEXT_LENGTH
        value: 3200
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 12
      - key: TTS_PROVIDER
        value: kokoro
      - key: KOKORO_SERVICE_URL
        sync: false
      - key: KOKORO_SERVICE_API_KEY
        sync: false
      - key: KOKORO_SERVICE_TIMEOUT_MS
        value: 60000
      - key: KOKORO_SERVICE_RETRY_COUNT
        value: 1
      - key: BACKEND_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_PATH
        value: /var/data/voiceforge.db
      - key: AUDIO_STORAGE_PATH
        value: /var/data/audio
